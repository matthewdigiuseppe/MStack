## MStack per-paper config.
## Edit at the start of a project; revisit after major decisions.

paper:
  title: ""
  short_name: ""           # for filenames; e.g. "tariffs-aid"
  format: "latex"          # "latex" | "quarto"
  status: "ideating"       # ideating | mapping | designing | building | analyzing | writing | submitted | r-and-r | accepted | archived

authors:
  - name: ""               # your name
    role: "lead"
  # - name: "Coauthor Name"
  #   role: "coauthor"

target_journals:
  # Tier in priority order. /journal-fit will populate this.
  # - name: "International Organization"
  #   tier: 1
  #   why: ""

design:
  type: ""                 # survey | experiment | quasi-experiment | observational
  prereg: false            # set true once /preregister is filed
  prereg_url: ""

stats:
  language: "R"            # default; r-coding-skills conventions apply
  primary_spec: ""         # one line describing THE specification

decisions:
  # Append a one-liner every time you make a non-obvious call.
  # - "2026-05-09: dropped 2008-2010 from sample due to crisis confound."

voice:
  # Name of a Claude Code skill that defines your prose voice (tone, rhythm,
  # vocabulary). MStack does not ship one — install or author your own and put
  # its skill name here. Leave empty to use a generic academic voice.
  writing_style: ""
  reviewer_style: "journal-reviewer-style"
